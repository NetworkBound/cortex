name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev build-essential \
            curl wget file libxdo-dev libdbus-1-dev pkg-config

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # --- Required gates (correctness) ---
      - name: TS typecheck
        run: pnpm typecheck

      - name: Rust build check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # --- Advisory gates (style) — reported but non-blocking ---
      - name: Rust fmt (advisory)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
        continue-on-error: true

      - name: Rust clippy (advisory)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml
        continue-on-error: true
