name: Build Windows MSI (manual)

# Trigger from the Actions tab or `gh workflow run build-msi.yml`.
# Produces an unsigned MSI + NSIS exe and uploads them as workflow artifacts.
# For signed + GitHub Release artifacts use the tag-based `release.yml` instead.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-msi.yml'
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build tsnet sidecar
        shell: bash
        run: bash scripts/build-tsnet-sidecar.sh x86_64-pc-windows-msvc

      - name: Inject sidecar externalBin into tauri.conf.json
        shell: bash
        run: |
          jq '.bundle.externalBin = ["binaries/cortex-tsnet"]' \
            src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Generate icons
        shell: pwsh
        run: |
          if (-not (Test-Path src-tauri/icons/icon.ico)) {
            if (Test-Path src-tauri/icons/source.png) {
              pnpm tauri icon src-tauri/icons/source.png
            }
          }

      - name: Build Tauri MSI + NSIS
        run: pnpm tauri build --bundles msi,nsis

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cortex-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
